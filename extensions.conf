[from-internal]
exten => 6001,1,Dial(PJSIP/6001)
exten => 6001,n,Hangup()

exten => 6002,1,Dial(PJSIP/6002)
exten => 6002,n,Hangup()

; Menu SVI
exten => 800,1,Answer()
exten => 800,n,Wait(1)
exten => 800,n,Background(dir-welcome)
exten => 800,n,WaitExten(5)

exten => 1,1,Dial(PJSIP/6001,20)
exten => 2,1,Dial(PJSIP/6002,20)

exten => i,1,Playback(pbx-invalid)
exten => i,n,Goto(800,3)

exten => t,1,Playback(vm-goodbye)
exten => t,n,Hangup()



Explication du code : 

 [from-internal] : Définit le contexte de sécurité. Seuls les utilisateurs 
 autorisés dans ce contexte peuvent utiliser ces règles d'appel.

 exten => 6001,1,Dial(PJSIP/6001) : 
 - 6001 : Le numéro composé.
 - 1 : La première étape (priorité) de l'extension.
 - Dial(PJSIP/6001) : Commande qui fait sonner le téléphone de l'utilisateur 6001.
 - n (next) : Passe automatiquement à l'étape suivante (Hangup) après l'appel.

 exten => 800,1,Answer() : Décroche automatiquement la ligne quand on appelle le 800.

 exten => 800,n,Background(dir-welcome) : Joue le message vocal de bienvenue 
 tout en restant à l'écoute des touches pressées par l'utilisateur (SVI).

 exten => 800,n,WaitExten(5) : Attend 5 secondes que l'utilisateur fasse un choix (1 ou 2).

 exten => 1,1,Dial(PJSIP/6001,20) : Si l'utilisateur tape 1, appelle le 6001 
 pendant 20 secondes maximum.

 exten => i,1,Playback(pbx-invalid) : Gestion du choix invalide (i = invalid). 
 Joue un message d'erreur si l'utilisateur tape une touche non prévue.

 exten => i,n,Goto(800,3) : Renvoie l'utilisateur à l'étape 3 du menu 800 pour 
 qu'il puisse réentendre le message de bienvenue.

 exten => t,1,Playback(vm-goodbye) : Gestion du temps dépassé (t = timeout). 
 Joue un message d'adieu si aucune touche n'est pressée, puis raccroche.
