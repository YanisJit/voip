[udp-transport]
type=transport
protocol=udp
bind=0.0.0.0

[tls-transport]
type=transport
protocol=tls
bind=0.0.0.0:5061
cert_file=/etc/asterisk/keys/asterisk.pem
priv_key_file=/etc/asterisk/keys/asterisk.key
method=tlsv1_2

[6001]
type=endpoint
context=from-internal
disallow=all
allow=ulaw,alaw
auth=6001-auth
aors=6001
media_encryption=sdes
transport=tls-transport

[6001-auth]
type=auth
auth_type=password
password=
username=6001

[6001]
type=aor
max_contacts=1

[6002]
type=endpoint
context=from-internal
disallow=all
allow=ulaw,alaw
auth=6002-auth
aors=6002
media_encryption=sdes
transport=tls-transport

[6002-auth]
type=auth
auth_type=password
password=
username=6002

[6002]
type=aor
max_contacts=1


Explication du code : 


 [udp-transport] & [tls-transport] : Définissent les méthodes de transport. 
 Le TLS est configuré sur le port 5061 avec les certificats pour chiffrer la signalisation.

 cert_file & priv_key_file : Chemins vers les certificats SSL/TLS permettant d'authentifier 
 le serveur et de monter le tunnel sécurisé.

 [6001] & [6002] (type=endpoint) : Configuration des utilisateurs.
 - context=from-internal : Relie l'utilisateur au plan de numérotation (SVI).
 - disallow=all / allow=ulaw,alaw : Force l'utilisation de codecs audio standards.
 - transport=tls-transport : Oblige l'utilisateur à se connecter via le protocole TLS.
 - media_encryption=sdes : Active le chiffrement SRTP pour sécuriser la voix.

 [6001-auth] (type=auth) : Gère l'authentification sécurisée par couple identifiant/mot de passe.

 [6001] (type=aor) : "Address of Record". Permet de définir combien d'appareils 
 peuvent se connecter simultanément sur le même compte (ici max_contacts=1).
